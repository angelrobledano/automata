version: '3.8'

services:
  db:
    image: ankane/pgvector:v0.5.1
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: agente_pedidos
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: backend.Dockerfile
    command: npm run start:api
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://admin:password123@db:5432/agente_pedidos?schema=public
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis

  chat-worker:
    build:
      context: .
      dockerfile: backend.Dockerfile
    command: npm run start:worker
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://admin:password123@db:5432/agente_pedidos?schema=public
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis

  doc-worker:
    build:
      context: .
      dockerfile: backend.Dockerfile
    command: npm run start:docworker
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://admin:password123@db:5432/agente_pedidos?schema=public
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis

  dashboard:
    build:
      context: .
      dockerfile: dashboard.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
