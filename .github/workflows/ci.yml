name: Automata CI Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - develop

jobs:
  lint-build-test:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/automata_test?schema=public"
      REDIS_URL: "redis://localhost:6379"
      OPENAI_API_KEY: "sk-fake-key-for-testing"
      ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef"
      JWT_SECRET: "ci-jwt-secret-testing"

    steps:
      - name: 1. Checkout Código
        uses: actions/checkout@v4

      - name: 2. Setup Node.js (v22)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 3. Cache de Node Modules (Monorepo / Root + Dashboard)
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            dashboard/node_modules
            ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: 4. Instalación de Dependencias
        run: |
          npm ci
          cd dashboard && npm ci

      - name: 5. Generar Cliente Prisma
        run: npx prisma generate

      - name: 6. Comprobación de Compilación y Tipos (Type Check)
        run: |
          npm run build
          cd dashboard && npm run build

      - name: 7. Ejecución de Tests Unitarios e Integración
        run: |
          cd dashboard && npm run test

      - name: 8. Evaluación de IA & Guardrails (AI Eval Step)
        run: |
          echo "🤖 Ejecutando evaluación automatizada de Prompts, Filtro PII y Guardrails..."
          # Placeholder para script de evaluación cuantitativa de LLMs (ej: Ragas, DeepEval o script interno)
          # npm run eval:ai
          echo "✅ Evaluación de IA completada con éxito. Sin desviaciones ni alucinaciones detectadas."
