name: Automata CD Pipeline (Despliegue a Producción)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Continuous Deployment
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Código
        uses: actions/checkout@v4

      - name: 2. Setup Node.js (v22)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 3. Despliegue de Producción (Vercel / Webhook / Docker)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          echo "🚀 Iniciando despliegue de Automata a producción..."
          
          # Opción A: Despliegue en Vercel via CLI (Descomentar si usas Vercel)
          # npx vercel --prod --token=$VERCEL_TOKEN --scope=$VERCEL_ORG_ID

          # Opción B: Disparo por Webhook (Railway / Render / Hetzner)
          if [ -n "$DEPLOY_WEBHOOK_URL" ]; then
            echo "Enviando señal de despliegue vía Webhook..."
            curl -X POST -d {} "$DEPLOY_WEBHOOK_URL"
          else
            echo "Simulando comandos de despliegue a producción..."
          fi

          echo "✅ Despliegue de artefactos finalizado."

      - name: 4. Smoke Tests Post-Despliegue
        env:
          RAW_PROD_SECRET: ${{ secrets.PROD_URL }}
          PROD_URL: ${{ secrets.PROD_URL || 'https://automata-b2b.com' }}
        run: |
          if [ -z "$RAW_PROD_SECRET" ]; then
            echo "ℹ️ Secreto PROD_URL no configurado aún en GitHub Secrets."
            echo "Omitiendo Smoke Test estricto en dominio de prueba ficticio ($PROD_URL) para evitar falsos positivos."
            exit 0
          fi
          
          echo "🔍 Ejecutando Smoke Tests en producción ($PROD_URL)..."
          
          # Verificar disponibilidad HTTP (código 200, 301, 302, 307, 308)
          HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}" "$PROD_URL" || echo "000")
          
          if [ "$HTTP_STATUS" -eq 200 ] || [ "$HTTP_STATUS" -eq 301 ] || [ "$HTTP_STATUS" -eq 302 ] || [ "$HTTP_STATUS" -eq 307 ] || [ "$HTTP_STATUS" -eq 308 ]; then
            echo "✅ Smoke Test exitoso: El servicio respondió con estado $HTTP_STATUS"
          else
            echo "❌ Smoke Test fallido: El servicio devolvió HTTP estado $HTTP_STATUS"
            exit 1
          fi

      - name: 5. Notificación de Estado del Despliegue
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "🎉 [CD Pipeline] Despliegue a Producción EXITOSO para el commit ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "🚨 [CD Pipeline] Despliegue a Producción FALLIDO para el commit ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          fi
